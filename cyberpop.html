<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Pop - Hand Gesture</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Minimal Space Palette based on reference */
            --space-black: #050507;
            --hull-gray-dark: #12141c;
            --hull-gray-light: #222533;
            --starlight-white: #ffffff;
            --hud-gray: #5a6175;
            
            /* Defined game colors based on theme */
            --game-pop: #ffffff;
            --hud-text: var(--starlight-white);
            --crosshair-color: #a3aed0;
        }
        
        body { margin: 0; overflow: hidden; background: var(--space-black); font-family: 'Rajdhani', sans-serif; color: #d1d5db; cursor: none; }
        
        /* --- BACKGROUND & HUD OVERLAYS --- */
        #bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 200%;
            z-index: 1;
            /* Starfield generated by gradients */
            background: radial-gradient(circle at center, #111424 0%, var(--space-black) 70%);
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px),
                radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 40px);
            background-size: 550px 550px, 350px 350px, 250px 250px;
            background-position: 0 0, 40px 60px, 130px 270px;
            opacity: 0.4;
            animation: moveSpace 120s linear infinite;
        }
        @keyframes moveSpace { from { transform: translateY(0); } to { transform: translateY(-50%); } }

        /* Sci-Fi Grid Overlay */
        .hud-grid {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 100px 100px;
            pointer-events: none;
            z-index: 2;
        }

        /* --- UI ELEMENTS (Angled & Tactical) --- */
        #ui { 
            position: absolute; top: 30px; left: 50%; 
            transform: translateX(-50%); z-index: 10; 
            text-align: center; width: 100%;
        }
        .stat-bar {
            display: inline-flex; gap: 40px; background: rgba(0,0,0,0.8);
            padding: 10px 45px; border-radius: 0px; 
            border: 1px solid var(--hud-gray);
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 1px;
            clip-path: polygon(5% 0, 100% 0, 95% 100%, 0% 100%); /* Angular HUD look */
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.05);
        }
        .stat-item { color: #a3aed0; font-size: 14px; font-weight: 500; }
        .stat-item span { color: var(--starlight-white); font-weight: 700; font-size: 26px; text-shadow: 0 0 10px rgba(255, 255, 255, 0.3); }

        /* Top-Left NAV_HOME */
        .btn-home {
            position: absolute; top: 30px; left: 30px; z-index: 210;
            background: transparent; color: #a3aed0; padding: 12px 25px;
            border: 1px solid var(--hud-gray);
            font-family: 'Orbitron', sans-serif; font-size: 11px; font-weight: 700;
            letter-spacing: 2px; text-decoration: none;
            transition: 0.3s;
        }
        .btn-home:hover {
            color: var(--starlight-white);
            border-color: var(--starlight-white);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }
        .btn-home::before, .btn-home::after { /* Brackets on hover */
            content: ''; position: absolute; width: 5px; height: 10px;
            border: 1px solid var(--starlight-white); transition: 0.3s; opacity: 0;
        }
        .btn-home::before { top: 0; left: 0; border-right: 0; border-bottom: 0; }
        .btn-home::after { bottom: 0; right: 0; border-left: 0; border-top: 0; }
        .btn-home:hover::before, .btn-home:hover::after { opacity: 1; transform: translate(-3px, -3px); }
        .btn-home:hover::after { transform: translate(3px, 3px); }

        /* Top-Right SYSTEM_ACCESS */
        .btn-system {
            position: absolute; top: 30px; right: 30px; z-index: 210;
            background: transparent; color: var(--starlight-white); padding: 12px 25px;
            border: 1px solid var(--starlight-white);
            border-radius: 4px;
            font-family: 'Orbitron', sans-serif; font-size: 11px; font-weight: 700;
            letter-spacing: 2px; text-decoration: none;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
            display: flex; align-items: center; gap: 8px;
        }
        .btn-system::before { content: ''; width: 6px; height: 6px; background: #ffffff; border-radius: 50%; display: inline-block; }

        /* Notification Message (Gray theme) */
        #msg-overlay {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            font-family: 'Orbitron', sans-serif; font-size: 4.5rem; font-weight: 700;
            color: #d1d5db; letter-spacing: 8px;
            text-shadow: 0 0 20px rgba(209, 213, 223, 0.3);
            opacity: 0; pointer-events: none; transition: 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 100;
        }
        .show-msg { opacity: 1 !important; transform: translate(-50%, -50%) scale(1.05) !important; }

        canvas { position: absolute; top: 0; left: 0; z-index: 3; }
        
        /* Video Container Positioning */
        #video-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 180px;
            height: 135px;
            z-index: 200; /* Keeps it visible above background layers */
        }

        /* Video Preview (Tactical style fixed inside wrapper) */
        #video-preview { 
            width: 100%;
            height: 100%;
            background: #000;
            border: 1px solid var(--hud-gray); 
            border-radius: 0px;
            transform: scaleX(-1); /* Flips camera horizontally for intuitive movement */
            opacity: 0.8;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            object-fit: cover;
        }
        
        /* Tactical corner brackets targeting the wrapper frame */
        #video-container::before {
            content: ''; position: absolute; top: -5px; left: -5px; width: 15px; height: 15px;
            border-top: 2px solid rgba(255,255,255,0.6); border-left: 2px solid rgba(255,255,255,0.6);
            z-index: 211; pointer-events: none;
        }
        #video-container::after {
            content: ''; position: absolute; bottom: -5px; right: -5px; width: 15px; height: 15px;
            border-bottom: 2px solid rgba(255,255,255,0.6); border-right: 2px solid rgba(255,255,255,0.6);
            z-index: 211; pointer-events: none;
        }

        #game-container { position: relative; width: 100%; height: 100%; z-index: 4; }

    </style>
</head>
<body>

<div id="bg"></div>
<div class="hud-grid"></div>

<a onclick="location.href='index.html'" class="btn-home">← NAV_HOME</a>
<div class="btn-system">SYSTEM_ACCESS</div>

<div id="ui">
    <div class="stat-bar">
        <div class="stat-item">SCORE_ <span id="score">0</span></div>
        <div class="stat-item">SYSTEM_ <span id="stage">1</span></div>
    </div>
</div>

<div id="msg-overlay">STAGE 1 CLEAR!</div>

<div id="game-container">
    <div id="video-container">
        <video id="video-preview" autoplay playsinline></video>
    </div>
    <canvas id="gameCanvas"></canvas>
</div>

<script>
const videoElement = document.getElementById('video-preview');
const canvasElement = document.getElementById('gameCanvas');
const ctx = canvasElement.getContext('2d');
const scoreEl = document.getElementById('score');
const stageEl = document.getElementById('stage');
const msgOverlay = document.getElementById('msg-overlay');

let score = 0;
let stage = 1;
let balloons = [];
// Start aim in center as requested
let cursor = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
let gameActive = true;

canvasElement.width = window.innerWidth;
canvasElement.height = window.innerHeight;

class Balloon {
    constructor(speedMult) {
        this.x = Math.random() * (canvasElement.width - 60) + 30;
        this.y = canvasElement.height + 50;
        this.radius = 25 + Math.random() * 20;
        this.speed = (2 + Math.random() * 4) * speedMult;
        
        /* Updated Gray-scale and starlight colors for balloons */
        const colors = [
            '#ffffff', // Starlight White
            '#d1d5db', // Gray
            '#8a92a6', // HUD Gray
            '#5a6175'  // Deep Gray
        ];
        this.color = colors[Math.floor(Math.random() * colors.length)];
    }
    update() { this.y -= this.speed; }
    draw() {
        ctx.save();
        /* Subtle white glow, no bright neon colors */
        ctx.shadowBlur = 15;
        ctx.shadowColor = 'rgba(255, 255, 255, 0.4)';
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.fill();
        ctx.strokeStyle = "rgba(255, 255, 255, 0.6)"; // White outline for all
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.restore();
    }
}

function showMessage(text) {
    msgOverlay.innerText = text;
    msgOverlay.classList.add('show-msg');
    setTimeout(() => msgOverlay.classList.remove('show-msg'), 2000);
}

function checkStage() {
    if (score >= 1500 && stage < 4) {
        stage = 4; stageEl.innerText = "MAX"; showMessage("ULTRA SPEED!");
    } else if (score >= 1000 && stage < 3) {
        stage = 3; stageEl.innerText = 3; showMessage("STAGE 2 CLEAR!");
    } else if (score >= 500 && stage < 2) {
        stage = 2; stageEl.innerText = 2; showMessage("STAGE 1 CLEAR!");
    }
}

function drawCrosshair() {
    /* Set crosshair to minimal gray color */
    const crosshairColor = '#a3aed0'; 
    const glowColor = 'rgba(255, 255, 255, 0.2)';

    ctx.save();
    ctx.strokeStyle = crosshairColor;
    ctx.lineWidth = 3;
    const size = 20;
    
    // Crosshair Lines
    ctx.beginPath();
    ctx.moveTo(cursor.x - size, cursor.y); ctx.lineTo(cursor.x + size, cursor.y);
    ctx.moveTo(cursor.x, cursor.y - size); ctx.lineTo(cursor.x, cursor.y + size);
    ctx.stroke();
    
    // Outer Circle with subtle glow
    ctx.beginPath();
    ctx.arc(cursor.x, cursor.y, size/1.5, 0, Math.PI*2);
    ctx.stroke();

    // Center Dot (Tactical point)
    ctx.fillStyle = '#ffffff'; // White point
    ctx.beginPath();
    ctx.arc(cursor.x, cursor.y, 3, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
}

function gameLoop() {
    ctx.clearRect(0, 0, canvasElement.width, canvasElement.height);
    
    drawCrosshair();

    for (let i = balloons.length - 1; i >= 0; i--) {
        balloons[i].update();
        balloons[i].draw();

        // Pop detection
        let dist = Math.hypot(cursor.x - balloons[i].x, cursor.y - balloons[i].y);
        if (dist < balloons[i].radius) {
            // Particle effect logic here if desired
            balloons.splice(i, 1);
            score += 10;
            scoreEl.innerText = score;
            checkStage();
        }
        else if (balloons[i] && balloons[i].y < -100) {
            balloons.splice(i, 1);
        }
    }

    // Faster spawning based on stage
    if (Math.random() < (0.02 + (stage * 0.01))) {
        balloons.push(new Balloon(1 + (stage * 0.3)));
    }

    requestAnimationFrame(gameLoop);
}

// --- MediaPipe Logic ---
const hands = new Hands({
    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
    maxNumHands: 1,
    modelComplexity: 1,
    minDetectionConfidence: 0.8,
    minTrackingConfidence: 0.8
});

hands.onResults((results) => {
    if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        const landmarks = results.multiHandLandmarks[0];
        // Index finger tip for smooth tracking
        cursor.x = (1 - landmarks[8].x) * canvasElement.width;
        cursor.y = landmarks[8].y * canvasElement.height;
    }
});

const camera = new Camera(videoElement, {
    onFrame: async () => {
        await hands.send({image: videoElement});
    },
    width: 640,
    height: 480
});

camera.start();
gameLoop();

window.addEventListener('resize', () => {
    canvasElement.width = window.innerWidth;
    canvasElement.height = window.innerHeight;
});
</script>
</body>
</html>
